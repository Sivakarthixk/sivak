<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K.L.N College of Engineering - Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.login-container{
    width:380px;
    background:#fff;
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,.4);
    text-align:center;
}

.logo{
    width:120px;
    margin-bottom:15px;
}

h2{
    color:#003366;
    margin-bottom:5px;
}

.subtitle{
    color:#666;
    font-size:14px;
    margin-bottom:25px;
}

.input-box{
    margin-bottom:18px;
    text-align:left;
}

.input-box label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
    color:#333;
}

.input-box input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

.input-box input:focus{
    border-color:#0066cc;
    outline:none;
    box-shadow:0 0 5px rgba(0,102,204,.3);
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#004080;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0066cc;
}

.footer{
    margin-top:20px;
    font-size:13px;
    color:#666;
}

a{
    color:#0066cc;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}
</style>

</head>
<body>

<div class="login-container">

    <img src="klnce.jpg" class="logo" alt="KLN Logo">

    <h2>K.L.N College of Engineering</h2>
    <div class="subtitle">Student Login Portal</div>

    <form action="#" method="post">

        <div class="input-box">
            <label>Register Number</label>
            <input type="text" placeholder="Enter Register Number" required>
        </div>

        <div class="input-box">
            <label>Password</label>
            <input type="password" placeholder="Enter Password" required>
        </div>

        <button type="submit">Login</button>

    </form>

    <div class="footer">
        Forgot Password?
        <a href="#">Click Here</a>
    </div>

</div>

</body>
</html>
