<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K.L.N. College of Engineering | Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.container{
    width:400px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:35px;
    text-align:center;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.logo{
    width:120px;
    height:120px;
    object-fit:contain;
    margin-bottom:15px;
    border-radius:50%;
    background:white;
    padding:5px;
}

h2{
    margin-bottom:5px;
}

p{
    color:#ddd;
    margin-bottom:25px;
}

.input-group{
    text-align:left;
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
}

.input-group input{
    width:100%;
    padding:12px;
    border:none;
    outline:none;
    border-radius:8px;
    font-size:15px;
}

.password-box{
    position:relative;
}

.password-box span{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#444;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#007BFF;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#0056b3;
}

.options{
    margin-top:15px;
    font-size:14px;
}

.options a{
    color:#FFD700;
    text-decoration:none;
}

.options a:hover{
    text-decoration:underline;
}

.email-btn{
    display:block;
    margin-top:20px;
    background:#28a745;
    color:white;
    padding:12px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    transition:.3s;
}

.email-btn:hover{
    background:#1f7f34;
}

.footer{
    margin-top:25px;
    font-size:13px;
    color:#ccc;
}
</style>

</head>
<body>

<div class="container">

<img src="klnce.jpg" class="logo" alt="KLN Logo">

<h2>K.L.N. College of Engineering</h2>
<p>Student Login Portal</p>

<form>

<div class="input-group">
<label>Register Number</label>
<input type="text" placeholder="Enter Register Number" required>
</div>

<div class="input-group">
<label>Password</label>

<div class="password-box">
<input type="password" id="password" placeholder="Enter Password" required>
<span onclick="togglePassword()">👁️</span>
</div>

</div>

<button type="submit">Login</button>

</form>

<div class="options">
<a href="#">Forgot Password?</a>
</div>

<a href="https://formsubmit.co/el/juzugu" target="_blank" class="email-btn">
📧 Email Support
</a>

<div class="footer">
© 2026 K.L.N. College of Engineering<br>
Department of Computer Science & Engineering
</div>

</div>

<script>
function togglePassword(){

var password=document.getElementById("password");

if(password.type==="password"){
password.type="text";
}
else{
password.type="password";
}

}
</script>

</body>
</html>
